<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OptiCrop - Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">OptiCrop</a>
        </div>
    </nav>

    <div class="container mt-5 text-center">
        <h2>Crop Recommendation Result</h2>
        <p><strong>Recommended Crop:</strong> {{ crop }}</p>
        <p><strong>Confidence Score:</strong> {{ confidence }}</p>
        <p><strong>Fertilizer Recommendation:</strong> {{ fertilizer }}</p>
        <p><strong>Irrigation Recommendation:</strong> {{ irrigation }}</p>
        <a href="/" class="btn btn-primary">Go Back</a>
    </div>
</body>
</html>
