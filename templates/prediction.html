<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OptiCrop - Prediction</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">OptiCrop</a>
    </div>
  </nav>

  <!-- Prediction Form -->
  <div class="container mt-5">
    <h2 class="text-center">Crop Prediction Form</h2>
    <form action="{{ url_for('predict') }}" method="post" class="row g-3">
      <div class="col-md-6"><label>Nitrogen (N)</label><input type="text" name="nitrogen" class="form-control"></div>
      <div class="col-md-6"><label>Phosphorous (P)</label><input type="text" name="phosphorous" class="form-control"></div>
      <div class="col-md-6"><label>Potassium (K)</label><input type="text" name="potassium" class="form-control"></div>
      <div class="col-md-6"><label>Temperature</label><input type="text" name="temperature" class="form-control"></div>
      <div class="col-md-6"><label>Humidity</label><input type="text" name="humidity" class="form-control"></div>
      <div class="col-md-6"><label>pH</label><input type="text" name="ph" class="form-control"></div>
      <div class="col-md-6"><label>Rainfall</label><input type="text" name="rainfall" class="form-control"></div>
      <div class="col-md-6"><label>Season</label><input type="text" name="season" class="form-control"></div>
      <div class="col-12"><button type="submit" class="btn btn-success">Predict Crop</button></div>
    </form>
  </div>
</body>
</html>
